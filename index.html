<body>
  <div id="app" class="app">
    <section class="panel">
      <h1>Loading Datashot KvK Tracker...</h1>
    </section>
  </div>

  <div id="chart-modal" class="modal-backdrop hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div class="modal-head">
        <h3>Alliance Total Growth Timeline</h3>
        <button class="close-btn" type="button" id="close-modal">Close</button>
      </div>
      <p class="muted">Timeline uses exact snapshot timestamps in UTC. Prep start is Day 1 on 2026-05-18 UTC.</p>
      <div id="modal-chart"></div>
      <div id="modal-chart-footer" class="chart-footer"></div>
    </div>
  </div>

  <script>
    const DATA_URL = './data/kvk-snapshots.json';
    const DEFAULT_PREP_START_DATE_UTC = '2026-05-18';
    const DEFAULT_PREP_DAYS = 5;

    function formatPower(value) {
      const n = Number(value || 0);
      if (!Number.isFinite(n)) return '—';
      if (Math.abs(n) >= 1000000000) return (n / 1000000000).toFixed(2) + 'B';
      if (Math.abs(n) >= 1000000) return (n / 1000000).toFixed(n >= 100000000 ? 0 : 1) + 'M';
      if (Math.abs(n) >= 1000) return (n / 1000).toFixed(1) + 'K';
      return String(n);
    }

    function formatSignedPower(value) {
      const n = Number(value || 0);
      return (n >= 0 ? '+' : '') + formatPower(n);
    }

    function formatPct(value) {
      const n = Number(value || 0);
      if (!Number.isFinite(n)) return '—';
      return (n >= 0 ? '+' : '') + n.toFixed(1) + '%';
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function normalizeKey(name) {
      return String(name || '')
        .trim()
        .toLowerCase()
        .replace(/\s+/g, ' ')
        .replace(/[\u200B-\u200D\uFEFF]/g, '');
    }

    function parsePower(value) {
      if (value == null || value === '') return 0;

      if (typeof value === 'number') {
        if (value > 0 && value < 1000) return Math.round(value * 1000000);
        return Math.round(value);
      }

      const text = String(value).trim().replace(/,/g, '');
      const match = text.match(/^(-?\d+(?:\.\d+)?)\s*([kmb])?$/i);

      if (!match) return Number(text) || 0;

      const n = Number(match[1]);
      const suffix = (match[2] || '').toLowerCase();

      if (suffix === 'b') return Math.round(n * 1000000000);
      if (suffix === 'm') return Math.round(n * 1000000);
      if (suffix === 'k') return Math.round(n * 1000);

      return Math.round(n);
    }

    function parseIntOrNull(value) {
      if (value === '' || value == null || Number.isNaN(Number(value))) return null;
      return Number(value);
    }

    function normalizeSnapshot(row) {
      const playerName = row.player_name || row.name || row.Player || row.player || '';

      const time =
        row.snapshot_time_utc ||
        row.snapshot_time ||
        row.snapshot_date_utc ||
        row.snapshot_date ||
        new Date().toISOString();

      const d = new Date(time);
      const iso = Number.isNaN(d.getTime()) ? new Date().toISOString() : d.toISOString();

      const townCenterRaw =
        row.town_center_level ??
        row.tc_level ??
        row.furnace_level ??
        row.furnace ??
        row.level ??
        row.Level ??
        null;

      const truegoldRaw =
        row.truegold_level ??
        row.tg_level ??
        row.truegold ??
        row.tg ??
        null;

      const parsedTruegold = parseIntOrNull(truegoldRaw);
      let parsedTownCenter = parseIntOrNull(townCenterRaw);

      if (parsedTruegold != null && parsedTruegold >= 1) {
        parsedTownCenter = 30;
      }

      return {
        ...row,
        player_name: playerName,
        player_key: row.player_key || normalizeKey(playerName),
        snapshot_time_utc: iso,
        snapshot_date_utc: iso.slice(0, 10),
        rank_group: row.rank_group || row.member_group || row.group || row.Group || 'Unknown',
        power: parsePower(row.power ?? row.Power ?? row.power_m ?? row['Power M']),
        town_center_level: parsedTownCenter,
        truegold_level: parsedTruegold,
      };
    }

    function buildStats(data) {
      const snapshots = (data.snapshots || [])
        .map(normalizeSnapshot)
        .sort((a, b) => new Date(a.snapshot_time_utc) - new Date(b.snapshot_time_utc));

      const prepStartDateUtc =
        data?.event?.prep_start_date_utc ||
        data?.event?.prepStartDateUtc ||
        DEFAULT_PREP_START_DATE_UTC;

      const prepDays = Number(data?.event?.prep_days || data?.event?.prepDays || DEFAULT_PREP_DAYS);
      const byPlayer = new Map();

      for (const snap of snapshots) {
        if (!snap.player_key) continue;
        if (!byPlayer.has(snap.player_key)) byPlayer.set(snap.player_key, []);
        byPlayer.get(snap.player_key).push(snap);
      }

      const earliestSnapshotTimeUtc = snapshots[0] ? snapshots[0].snapshot_time_utc : null;

      const players = Array.from(byPlayer.entries()).map(([key, list]) => {
        list.sort((a, b) => new Date(a.snapshot_time_utc) - new Date(b.snapshot_time_utc));

        const first = list[0];
        const latest = list[list.length - 1];
        const gain = Number(latest.power || 0) - Number(first.power || 0);
        const growthEligible = first.snapshot_time_utc === earliestSnapshotTimeUtc;

        return {
          key,
          name: latest.player_name || first.player_name || key,
          group: latest.rank_group || 'Unknown',
          townCenter: latest.town_center_level,
          truegold: latest.truegold_level,
          currentPower: Number(latest.power || 0),
          startingPower: Number(first.power || 0),
          gain,
          pctGain: first.power ? (gain / first.power) * 100 : 0,
          growthEligible,
          snapshots: list,
        };
      });

      players.sort((a, b) => b.currentPower - a.currentPower);

      const totalPower = players.reduce((sum, p) => sum + p.currentPower, 0);
      const avgPower = players.length ? totalPower / players.length : 0;
      const dates = Array.from(new Set(snapshots.map((s) => s.snapshot_date_utc))).sort();
      const latestTimeUtc = snapshots.map((s) => s.snapshot_time_utc).sort().at(-1) || null;

      const groupOrder = ['R5', 'R4', 'R3', 'R2', 'R1', 'Unknown'];
      const groupStats = groupOrder
        .map((group) => {
          const members = players.filter((p) => p.group === group);
          const groupPower = members.reduce((sum, p) => sum + p.currentPower, 0);

          return {
            group,
            count: members.length,
            totalPower: groupPower,
            avgPower: members.length ? groupPower / members.length : 0,
          };
        })
        .filter((g) => g.count > 0);

      const townCenterBuckets = [
        { label: 'TC30', test: (n) => n === 30 },
        { label: 'TC29', test: (n) => n === 29 },
        { label: 'TC28', test: (n) => n === 28 },
        { label: 'TC27 and below', test: (n) => n != null && n <= 27 },
        { label: 'Unknown', test: (n) => n == null },
      ].map((bucket) => {
        const members = players.filter((p) => bucket.test(p.townCenter));

        return {
          label: bucket.label,
          count: members.length,
          totalPower: members.reduce((sum, p) => sum + p.currentPower, 0),
        };
      });

      const truegoldBuckets = [
        { label: 'TG-3+', test: (n) => n != null && n >= 3 },
        { label: 'TG-2', test: (n) => n === 2 },
        { label: 'TG-1', test: (n) => n === 1 },
        { label: 'No TG badge', test: (n) => n == null },
      ].map((bucket) => {
        const members = players.filter((p) => bucket.test(p.truegold));

        return {
          label: bucket.label,
          count: members.length,
          totalPower: members.reduce((sum, p) => sum + p.currentPower, 0),
        };
      });

      const timeline = buildTimeline(snapshots, prepStartDateUtc);
      const hasGrowth = timeline.length > 1;

      const eligibleGrowthPlayers = players
        .filter((p) => p.growthEligible)
        .sort((a, b) => b.gain - a.gain || b.pctGain - a.pctGain);

      const highestGrowerOverall = eligibleGrowthPlayers[0] || null;

      const allPlayerGrowth = [...players]
        .sort((a, b) => {
          if (a.growthEligible !== b.growthEligible) return a.growthEligible ? -1 : 1;
          return b.gain - a.gain || b.pctGain - a.pctGain || b.currentPower - a.currentPower;
        });

      const watchlist = players
        .filter((p) => {
          const missingSnapshot = p.snapshots.length < timeline.length;
          const noGrowth = hasGrowth && p.growthEligible && p.gain <= 0;
          const lowTc = !p.townCenter || p.townCenter < 28;
          return missingSnapshot || noGrowth || lowTc;
        })
        .sort((a, b) => a.gain - b.gain)
        .slice(0, 25);

      return {
        snapshots,
        players,
        totalPower,
        avgPower,
        latestTimeUtc,
        dates,
        groupStats,
        townCenterBuckets,
        truegoldBuckets,
        eligibleGrowthPlayers,
        growthLeaders: allPlayerGrowth,
        highestGrowerOverall,
        topPower: players.slice(0, 20),
        watchlist,
        hasGrowth,
        timeline,
        prepStartDateUtc,
        prepDays,
        currentPrepDay: calculatePrepDay(latestTimeUtc, prepStartDateUtc),
        tc30Count: players.filter((p) => p.townCenter === 30).length,
        tc29PlusCount: players.filter((p) => p.townCenter != null && p.townCenter >= 29).length,
        truegoldCount: players.filter((p) => p.truegold != null && p.truegold >= 1).length,
      };
    }

    function buildTimeline(snapshots, prepStartDateUtc) {
      const byTime = new Map();

      for (const snap of snapshots) {
        if (!byTime.has(snap.snapshot_time_utc)) byTime.set(snap.snapshot_time_utc, []);
        byTime.get(snap.snapshot_time_utc).push(snap);
      }

      const points = Array.from(byTime.entries())
        .sort((a, b) => new Date(a[0]) - new Date(b[0]))
        .map(([timeUtc, rows]) => ({
          timeUtc,
          dateUtc: timeUtc.slice(0, 10),
          totalPower: rows.reduce((sum, row) => sum + Number(row.power || 0), 0),
          memberCount: rows.length,
          prepDay: calculatePrepDay(timeUtc, prepStartDateUtc),
        }));

      const baseline = points[0] ? points[0].totalPower : 0;

      return points.map((point) => ({
        ...point,
        gainFromStart: point.totalPower - baseline,
      }));
    }

    function calculatePrepDay(timeUtc, prepStartDateUtc) {
      if (!timeUtc || !prepStartDateUtc) return 1;

      const dayMs = 24 * 60 * 60 * 1000;
      const current = new Date(timeUtc);
      const start = new Date(prepStartDateUtc + 'T00:00:00Z');

      const currentDayUtc = Date.UTC(current.getUTCFullYear(), current.getUTCMonth(), current.getUTCDate());
      const startDayUtc = Date.UTC(start.getUTCFullYear(), start.getUTCMonth(), start.getUTCDate());

      return Math.floor((currentDayUtc - startDayUtc) / dayMs) + 1;
    }

    function makeTable(headers, rows) {
      const bodyRows = Array.isArray(rows) ? rows.join('') : String(rows || '');

      return (
        '<div class="table-wrap">' +
          '<table>' +
            '<thead><tr>' +
              headers.map((h) => '<th>' + escapeHtml(h) + '</th>').join('') +
            '</tr></thead>' +
            '<tbody>' + bodyRows + '</tbody>' +
          '</table>' +
        '</div>'
      );
    }

    function makeBarChart(items, valueKey, labelKey) {
      const max = Math.max(...items.map((item) => Number(item[valueKey] || 0)), 1);

      return (
        '<div class="bar-list">' +
          items.map((item) => {
            const value = Number(item[valueKey] || 0);
            const pct = value === 0 ? 0 : Math.max(2, Math.round((value / max) * 100));

            return (
              '<div class="bar-row">' +
                '<div class="bar-label">' +
                  '<span>' + escapeHtml(item[labelKey]) + '</span>' +
                  '<strong>' + value + '</strong>' +
                '</div>' +
                '<div class="bar-track">' +
                  '<div class="bar-fill" style="width:' + pct + '%"></div>' +
                '</div>' +
              '</div>'
            );
          }).join('') +
        '</div>'
      );
    }

    function makePowerBarChart(items, valueKey, labelKey) {
      const max = Math.max(...items.map((item) => Number(item[valueKey] || 0)), 1);

      return (
        '<div class="bar-list">' +
          items.map((item) => {
            const value = Number(item[valueKey] || 0);
            const pct = value === 0 ? 0 : Math.max(2, Math.round((value / max) * 100));

            return (
              '<div class="bar-row">' +
                '<div class="bar-label">' +
                  '<span>' + escapeHtml(item[labelKey]) + '</span>' +
                  '<strong>' + formatPower(value) + '</strong>' +
                '</div>' +
                '<div class="bar-track">' +
                  '<div class="bar-fill" style="width:' + pct + '%"></div>' +
                '</div>' +
              '</div>'
            );
          }).join('') +
        '</div>'
      );
    }

    function makeLineChart(points, height, detailed) {
      if (!points.length) {
        return '<div class="chart-card">No timeline data available.</div>';
      }

      const width = 860;
      const padTop = 22;
      const padRight = 18;
      const padBottom = detailed ? 54 : 38;
      const padLeft = 58;
      const plotWidth = width - padLeft - padRight;
      const plotHeight = height - padTop - padBottom;

      const values = points.map((p) => Number(p.totalPower || 0));
      const minRaw = Math.min(...values);
      const maxRaw = Math.max(...values);
      const rawRange = maxRaw - minRaw || Math.max(1, maxRaw * 0.03);
      const min = minRaw - rawRange * 0.08;
      const max = maxRaw + rawRange * 0.08;
      const range = max - min || 1;

      const positions = points.map((point, index) => {
        const x = points.length === 1 ? padLeft + plotWidth / 2 : padLeft + (index / (points.length - 1)) * plotWidth;
        const y = padTop + ((max - point.totalPower) / range) * plotHeight;
        return { ...point, x, y };
      });

      const path = positions.map((p, i) => (i === 0 ? 'M ' : 'L ') + p.x + ' ' + p.y).join(' ');
      const tickCount = 4;
      const yTicks = Array.from({ length: tickCount + 1 }, (_, i) => {
        const value = max - ((max - min) * i) / tickCount;
        const y = padTop + (plotHeight * i) / tickCount;
        return { value, y };
      });

      const labelIndexes = uniqueIndexes(
        detailed
          ? [0, Math.floor((points.length - 1) * 0.25), Math.floor((points.length - 1) * 0.5), Math.floor((points.length - 1) * 0.75), points.length - 1]
          : [0, Math.floor((points.length - 1) / 2), points.length - 1]
      );

      return (
        '<svg class="line-chart" viewBox="0 0 ' + width + ' ' + height + '" preserveAspectRatio="none" role="img" aria-label="Alliance total power growth timeline">' +
          yTicks.map((tick) => (
            '<g>' +
              '<line x1="' + padLeft + '" y1="' + tick.y + '" x2="' + (width - padRight) + '" y2="' + tick.y + '" class="chart-grid"></line>' +
              '<text x="12" y="' + (tick.y + 4) + '" class="chart-axis">' + formatPower(tick.value) + '</text>' +
            '</g>'
          )).join('') +
          '<path d="' + path + '" fill="none" class="chart-line"></path>' +
          positions.map((p) => (
            '<circle cx="' + p.x + '" cy="' + p.y + '" r="5" class="chart-point"></circle>'
          )).join('') +
          labelIndexes.map((index) => {
            const p = positions[index];
            return '<text x="' + p.x + '" y="' + (height - 10) + '" text-anchor="middle" class="chart-axis">' + formatAxisLabel(p.timeUtc, detailed) + '</text>';
          }).join('') +
        '</svg>'
      );
    }

    function uniqueIndexes(values) {
      return Array.from(new Set(values.filter((v) => Number.isInteger(v) && v >= 0)));
    }

    function formatAxisLabel(value, detailed) {
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value || '—');

      const month = String(d.getUTCMonth() + 1).padStart(2, '0');
      const day = String(d.getUTCDate()).padStart(2, '0');
      const hour = String(d.getUTCHours()).padStart(2, '0');
      const minute = String(d.getUTCMinutes()).padStart(2, '0');

      if (detailed) return month + '/' + day + ' ' + hour + ':' + minute + 'Z';
      return month + '/' + day;
    }

    function renderDashboard(data) {
      const stats = buildStats(data);
      const app = document.getElementById('app');

      const topPowerRows = stats.topPower.map((p, i) => {
        const tcText = p.townCenter == null ? '—' : 'TC' + p.townCenter;
        const tgText = p.truegold == null ? '—' : 'TG-' + p.truegold;

        return (
          '<tr>' +
            '<td>' + (i + 1) + '</td>' +
            '<td>' + escapeHtml(p.name) + '</td>' +
            '<td>' + escapeHtml(p.group) + '</td>' +
            '<td>' + formatPower(p.currentPower) + '</td>' +
            '<td>' + tcText + '</td>' +
            '<td>' + tgText + '</td>' +
          '</tr>'
        );
      }).join('');

      const growthRows = stats.growthLeaders.map((p, i) => {
        const gainClass = p.gain >= 0 ? 'good' : 'bad';
        const gainPrefix = p.gain >= 0 ? '+' : '';
        const pctPrefix = p.pctGain >= 0 ? '+' : '';
        const tcText = p.townCenter == null ? '—' : 'TC' + p.townCenter;
        const tgText = p.truegold == null ? '—' : 'TG-' + p.truegold;
        const startText = p.growthEligible ? formatPower(p.startingPower) : 'New';
        const gainText = p.growthEligible ? gainPrefix + formatPower(p.gain) : '—';
        const pctText = p.growthEligible ? pctPrefix + p.pctGain.toFixed(1) + '%' : '—';

        return (
          '<tr>' +
            '<td>' + (i + 1) + '</td>' +
            '<td>' + escapeHtml(p.name) + '</td>' +
            '<td>' + escapeHtml(p.group) + '</td>' +
            '<td>' + startText + '</td>' +
            '<td>' + formatPower(p.currentPower) + '</td>' +
            '<td class="' + gainClass + '">' + gainText + '</td>' +
            '<td>' + pctText + '</td>' +
            '<td>' + tcText + '</td>' +
            '<td>' + tgText + '</td>' +
          '</tr>'
        );
      }).join('');

      const groupRows = stats.groupStats.map((g) => {
        return (
          '<tr>' +
            '<td>' + escapeHtml(g.group) + '</td>' +
            '<td>' + g.count + '</td>' +
            '<td>' + formatPower(g.totalPower) + '</td>' +
            '<td>' + formatPower(g.avgPower) + '</td>' +
          '</tr>'
        );
      }).join('');

      const townCenterRows = stats.townCenterBuckets.map((f) => {
        return (
          '<tr>' +
            '<td>' + escapeHtml(f.label) + '</td>' +
            '<td>' + f.count + '</td>' +
            '<td>' + formatPower(f.totalPower) + '</td>' +
          '</tr>'
        );
      }).join('');

      const truegoldRows = stats.truegoldBuckets.map((f) => {
        return (
          '<tr>' +
            '<td>' + escapeHtml(f.label) + '</td>' +
            '<td>' + f.count + '</td>' +
            '<td>' + formatPower(f.totalPower) + '</td>' +
          '</tr>'
        );
      }).join('');

      const watchRows = stats.watchlist.map((p) => {
        const reasons = [];

        if (p.snapshots.length < stats.timeline.length) reasons.push('Missing latest snapshot');
        if (stats.hasGrowth && p.growthEligible && p.gain <= 0) reasons.push('No growth');
        if (!p.townCenter) reasons.push('Unknown Town Center');
        else if (p.townCenter < 28) reasons.push('TC' + p.townCenter);

        return (
          '<tr>' +
            '<td>' + escapeHtml(p.name) + '</td>' +
            '<td>' + escapeHtml(p.group) + '</td>' +
            '<td>' + escapeHtml(reasons.join(', ') || 'Review') + '</td>' +
            '<td>' + formatPower(p.currentPower) + '</td>' +
          '</tr>'
        );
      }).join('');

      const mainTable = stats.hasGrowth
        ? makeTable(['#', 'Player', 'Group', 'Start', 'Current', 'Gain', '%', 'TC', 'TG'], growthRows)
        : makeTable(['#', 'Player', 'Group', 'Power', 'TC', 'TG'], topPowerRows);

      const watchTable = watchRows
        ? makeTable(['Player', 'Group', 'Reason', 'Power'], watchRows)
        : '<p class="muted">No watchlist items yet.</p>';

      const baselineCallout = !stats.hasGrowth
        ? (
          '<section class="panel">' +
            '<h2>Baseline Captured</h2>' +
            '<p>This is the starting snapshot. After the next update, the dashboard will show power gain, percentage gain, and low-growth tracking.</p>' +
          '</section>'
        )
        : '';

      const highest = stats.highestGrowerOverall;
      const startPower = stats.timeline[0]?.totalPower || 0;
      const currentPower = stats.timeline.at(-1)?.totalPower || 0;
      const totalGain = currentPower - startPower;

      app.innerHTML =
        '<header class="hero">' +
          '<div class="eyebrow">Datashot</div>' +
          '<h1>KvK Prep Growth Tracker</h1>' +
          '<p class="muted">Alliance power, Town Center, and Truegold readiness for KvK preparation.</p>' +
          '<p class="muted">Latest update: ' + escapeHtml(stats.latestTimeUtc || '—') + ' UTC</p>' +
        '</header>' +

        baselineCallout +

        '<section class="grid">' +
          '<div class="stat"><span>Members</span><strong>' + stats.players.length + '</strong></div>' +
          '<div class="stat"><span>Total Power</span><strong>' + formatPower(stats.totalPower) + '</strong></div>' +
          '<div class="stat"><span>Average Power</span><strong>' + formatPower(stats.avgPower) + '</strong></div>' +
          '<div class="stat"><span>TC30 Members</span><strong>' + stats.tc30Count + '</strong></div>' +
          '<div class="stat"><span>TC29+ Members</span><strong>' + stats.tc29PlusCount + '</strong></div>' +
          '<div class="stat"><span>Truegold Members</span><strong>' + stats.truegoldCount + '</strong></div>' +
        '</section>' +

        '<section class="panel">' +
          '<h2>Alliance Snapshot</h2>' +
          '<div class="snapshot-grid">' +
            '<div class="spotlight-card">' +
              '<div class="spotlight-label">Highest grower overall</div>' +
              (
                highest
                  ? '<div class="spotlight-name">' + escapeHtml(highest.name) + '</div>' +
                    '<div class="spotlight-value">' + formatSignedPower(highest.gain) + '</div>' +
                    '<div class="spotlight-sub">' + formatPct(highest.pctGain) + ' from prep start</div>' +
                    '<div class="spotlight-meta">Current power: ' + formatPower(highest.currentPower) + ' • ' + escapeHtml(highest.group) + ' • ' +
                      (highest.townCenter ? 'TC' + highest.townCenter : 'TC unknown') +
                      (highest.truegold ? ' • TG-' + highest.truegold : '') +
                    '</div>'
                  : '<p class="muted">Need at least two prep snapshots to calculate the highest grower.</p>'
              ) +
            '</div>' +

            '<button class="chart-card" type="button" id="open-chart">' +
              '<div class="chart-head">' +
                '<div>' +
                  '<div class="chart-title">Alliance total growth</div>' +
                  '<div class="chart-subtitle">From prep start • UTC timeline • Prep day ' + stats.currentPrepDay + ' of ' + stats.prepDays + '</div>' +
                '</div>' +
                '<span class="chart-zoom">Tap to enlarge</span>' +
              '</div>' +
              makeLineChart(stats.timeline, 220, false) +
              '<div class="chart-footer">' +
                '<span>Start: ' + formatPower(startPower) + '</span>' +
                '<span>Current: ' + formatPower(currentPower) + '</span>' +
                '<span class="good">' + formatSignedPower(totalGain) + '</span>' +
              '</div>' +
            '</button>' +
          '</div>' +
        '</section>' +

        '<section class="two-col">' +
          '<section class="panel">' +
            '<h2>Power by Rank Group</h2>' +
            '<p class="section-note">Total visible power contribution by alliance rank group.</p>' +
            makePowerBarChart(stats.groupStats, 'totalPower', 'group') +
          '</section>' +

          '<section class="panel">' +
            '<h2>Town Center Readiness</h2>' +
            '<p class="section-note">Town Center level is the core progression level shown beside the tower icon.</p>' +
            makeBarChart(stats.townCenterBuckets, 'count', 'label') +
          '</section>' +
        '</section>' +

        '<section class="two-col">' +
          '<section class="panel">' +
            '<h2>Truegold Advancement</h2>' +
            '<p class="section-note">Gold numbered badges indicate Truegold tier: TG-1, TG-2, and above.</p>' +
            makeBarChart(stats.truegoldBuckets, 'count', 'label') +
          '</section>' +

          '<section class="panel">' +
            '<h2>Readiness Tables</h2>' +
            '<h3>Town Center</h3>' +
            makeTable(['Bucket', 'Members', 'Power'], townCenterRows) +
            '<h3>Truegold</h3>' +
            makeTable(['Bucket', 'Members', 'Power'], truegoldRows) +
          '</section>' +
        '</section>' +

        '<section class="panel">' +
          '<h2>' + (stats.hasGrowth ? 'All Player Growth' : 'Top Power Leaderboard') + '</h2>' +
          '<p class="section-note">All members in one scrollable table. Growth is calculated from the start of prep; new players display as New and do not count as growth.</p>' +
          '<div class="scroll-panel">' +
            mainTable +
          '</div>' +
        '</section>' +

        '<section class="two-col">' +
          '<section class="panel">' +
            '<h2>Rank Group Table</h2>' +
            makeTable(['Group', 'Members', 'Total Power', 'Average Power'], groupRows) +
          '</section>' +

          '<section class="panel">' +
            '<h2>Watchlist</h2>' +
            watchTable +
          '</section>' +
        '</section>' +

        '<section class="panel">' +
          '<h2>KvK Prep Focus</h2>' +
          '<p>Today in game time is Day 1 of a 5-day prep window. Growth is calculated from the starting prep snapshot using UTC timestamps.</p>' +
          '<p class="muted">All timestamps are tracked in UTC.</p>' +
        '</section>';

      const openChartButton = document.getElementById('open-chart');
      if (openChartButton) {
        openChartButton.addEventListener('click', () => openChartModal(stats));
      }
    }

    function openChartModal(stats) {
      const modal = document.getElementById('chart-modal');
      const modalChart = document.getElementById('modal-chart');
      const modalFooter = document.getElementById('modal-chart-footer');

      const startPower = stats.timeline[0]?.totalPower || 0;
      const currentPower = stats.timeline.at(-1)?.totalPower || 0;
      const totalGain = currentPower - startPower;

      modalChart.innerHTML = makeLineChart(stats.timeline, 360, true);
      modalFooter.innerHTML =
        '<span>Start: ' + formatPower(startPower) + '</span>' +
        '<span>Current: ' + formatPower(currentPower) + '</span>' +
        '<span class="good">' + formatSignedPower(totalGain) + '</span>';

      modal.classList.remove('hidden');
    }

    function closeChartModal() {
      document.getElementById('chart-modal').classList.add('hidden');
    }

    document.getElementById('close-modal').addEventListener('click', closeChartModal);
    document.getElementById('chart-modal').addEventListener('click', (event) => {
      if (event.target.id === 'chart-modal') closeChartModal();
    });

    async function loadData() {
      const app = document.getElementById('app');

      try {
        const res = await fetch(DATA_URL, { cache: 'no-store' });

        if (!res.ok) {
          throw new Error('Could not load ' + DATA_URL + '. HTTP ' + res.status);
        }

        const data = await res.json();

        data.event = {
          ...(data.event || {}),
          timezone_policy: 'UTC',
          prep_start_date_utc: data?.event?.prep_start_date_utc || DEFAULT_PREP_START_DATE_UTC,
          prep_days: data?.event?.prep_days || DEFAULT_PREP_DAYS,
        };

        renderDashboard(data);
      } catch (err) {
        app.innerHTML =
          '<section class="panel">' +
            '<h1>Datashot KvK Tracker</h1>' +
            '<p class="error">' + escapeHtml(err.message) + '</p>' +
            '<p>Check that <code>data/kvk-snapshots.json</code> exists and contains valid JSON.</p>' +
          '</section>';
      }
    }

    loadData();
  </script>
</body>
</html>
